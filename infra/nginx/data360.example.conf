# Example nginx server block for data360-monitor.
#
# Copy to /etc/nginx/sites-available/data360 and edit:
#   - server_name
#   - the absolute path to .htpasswd
#   - TLS certificate paths
#
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name data360.example.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name data360.example.org;

    ssl_certificate     /etc/letsencrypt/live/data360.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/data360.example.org/privkey.pem;

    access_log /var/log/nginx/data360.access.log combined;
    error_log  /var/log/nginx/data360.error.log;

    # Gate the whole site with HTTP basic auth until the demo opens.
    auth_basic           "Data360 News Agent (demo)";
    auth_basic_user_file /opt/scripts/data360/infra/nginx/.htpasswd;

    location / {
        proxy_pass http://localhost:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 80 4k;
    }

    location /static/ {
        proxy_pass http://localhost:8090;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
